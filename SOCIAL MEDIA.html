<script>
    
    document.addEventListener("dragstart", function(e){        /*Image drag & drop block*/
        if(e.target.tagName === "IMG"){
            e.preventDefault();
        }
    });

    

    document.addEventListener("copy", function(e){             /*Image copy block (JS)*/
        e.preventDefault();
    });


   
    
    document.addEventListener("keydown", function(e){          /*Screenshot block*/
        if(e.key === "PrintScreen"){
            alert("Screenshot disabled!");
        }
    });


    
    document.addEventListener("contextmenu", function(e){       /*Right-click disable*/
        e.preventDefault();
    });


/*========================Only Mobile Security(JS)=====================================*/

   
    document.addEventListener("contextmenu", function(e){       /*Long-press (mobile) disable*/
        e.preventDefault();
    });


    
    document.addEventListener("touchstart", function(e){        /*Image drag + touch hold block*/
        if(e.target.tagName === "IMG"){
            e.preventDefault();
        }
    }, {passive:false});



/*========================Only Mobile Security(JS) End=====================================*/

/*=====================Exra secutity(JS)===================================================*/


    setInterval(function(){
        if(window.outerWidth - window.innerWidth > 160){         /*DevTools detect (extra layer)*/
            document.body.innerHTML = "";
        }
    }, 1000);

   

    /*window.addEventListener("blur", function(){ */                /*Blur screen when user switches focus*/
        /*document.body.style.filter = "blur(20px)";
    });*/

    /*window.addEventListener("focus", function(){
        document.body.style.filter = "blur(0)";
    });*/



    /*document.addEventListener("visibilitychange", function(){*/       /*Visibility change detect*/

        /*if(document.hidden){
            document.body.style.filter = "blur(25px)";
        }else{
            document.body.style.filter = "blur(0)";
        }

    });*/


    
    document.addEventListener("keydown", function(e){      /*Keyboard shortcuts block*/

        /* Ctrl + C */
        if(e.ctrlKey && e.key === "c"){
            e.preventDefault();
        }

        /* Ctrl + S */
        if(e.ctrlKey && e.key === "s"){
            e.preventDefault();
        }

        /* Ctrl + U (view source) */
        if(e.ctrlKey && e.key === "u"){
            e.preventDefault();
        }

        /* F12 */
        if(e.key === "F12"){
            e.preventDefault();
        }

    });


    
    document.addEventListener("keydown", function(e){

        /* Ctrl + U */
        if(e.ctrlKey && (e.key === "u" || e.key === "U")){
            e.preventDefault();
            e.stopPropagation();
            return false;
        }

        /* Ctrl + Shift + I */
        if(e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "i")){
            e.preventDefault();
            return false;
        }

        /* F12 */
        if(e.key === "F12"){
            e.preventDefault();
            return false;
        }

    });


    window.onkeydown = function(e){

        if(e.ctrlKey && e.keyCode === 85){ // U
            return false;
        }

        if(e.keyCode === 123){ // F12
            return false;
        }

    };


/*=====================Exra secutity(JS) End===================================================*/
</script>

                   0 0 20px #ff005e,
                   0 0 40px #ff005e,
                   0 0 80px #ff005e;
             animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
             0% {
                text-shadow:
                 0 0 5px #ff005e, 
                 0 0 10px #ff005e, 
                 0 0 20px #ff005e, 
                 0 0 40px #ff005e, 
                 0 0 80px #ff005e;
             }
             100% {
                 text-shadow: 
                  0 0 10px #00d4ff, 
                  0 0 20px #00d4ff,
                  0 0 40px #00d4ff, 
                  0 0 80px #00d4ff, 
                  0 0 160px #00d4ff;
            }
        }



        /* ===== ANIMATIONS ===== */

        @keyframes netflixIntro{

            0%{

                opacity:0;

                transform:scale(0.8);

                letter-spacing:20px;

            }

            100%{

                opacity:1;

                transform:scale(1);

                letter-spacing:8px;

            }

        }

        @keyframes fadeUp{

            0%{

                opacity:0;

                transform:translateY(40px);

            }

            100%{

                opacity:1;

                transform:translateY(0);

            }

        }

        @keyframes sweep{

            0%{left:-120%;}
            100%{left:120%;}

        }

        @keyframes float{

            0%{transform:translateY(0);}
            50%{transform:translateY(-15px);}
            100%{transform:translateY(0);}

        }
